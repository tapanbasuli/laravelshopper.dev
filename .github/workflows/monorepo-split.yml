name: monorepo-split

on:
  push:
    branches:
      - '*.x'
    tags:
      - '*'

jobs:
  split-monorepo:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - admin
          - core
          - payment
          - sidebar
          - shipping
          - stripe
          - types
        include:
          - package: admin
            repository: admin
          - package: core
            repository: core
          - package: payment
            repository: payment
          - package: sidebar
            repository: sidebar
          - package: shipping
            repository: shipping
          - package: stripe
            repository: stripe
          - package: types
            repository: shopper-types
    steps:
      - uses: actions/checkout@v6
      - id: previous-tag
        uses: 'WyriHaximus/github-action-get-previous-tag@master'
      - name: Monorepo Split of ${{ matrix.package }}
        uses: danharrin/monorepo-split-github-action@v2.4.2
        env:
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        with:
          package_directory: 'packages/${{ matrix.package }}'
          repository_organization: 'shopperlabs'
          repository_name: '${{ matrix.repository }}'
          branch: ${{ github.ref_name }}
          tag: ${{ steps.previous-tag.outputs.tag }}
          user_name: 'Arthur Monney'
          user_email: 'monneylobe@gmail.com'
